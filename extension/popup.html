<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-container">
      <h3>Scholar Journal Highlighter</h3>

      <div class="section">
        <div class="section-label">JOURNAL LISTS</div>
        <div class="toggle-row">
          <label>
            <input type="checkbox" id="toggle-utd24" checked />
            <span class="color-dot utd24-dot"></span>
            <span class="toggle-label">UTD24</span>
            <span class="toggle-count" id="count-utd24"></span>
          </label>
        </div>
        <div class="toggle-row">
          <label>
            <input type="checkbox" id="toggle-ft50" checked />
            <span class="color-dot ft50-dot"></span>
            <span class="toggle-label">FT50</span>
            <span class="toggle-count" id="count-ft50"></span>
          </label>
        </div>
        <div class="toggle-row">
          <label>
            <input type="checkbox" id="toggle-abdc" checked />
            <span class="color-dot abdc-dot"></span>
            <span class="toggle-label">ABDC</span>
            <span class="toggle-count" id="count-abdc"></span>
          </label>
        </div>
        <div class="toggle-row">
          <label>
            <input type="checkbox" id="toggle-custom" checked />
            <span class="color-dot custom-dot"></span>
            <span class="toggle-label">My List</span>
            <span class="toggle-count" id="count-custom"></span>
          </label>
          <button id="manage-btn" title="Manage My List">Edit</button>
        </div>
      </div>

      <div class="section" id="custom-section" style="display:none">
        <div class="section-label">MY LIST</div>
        <div id="custom-list"></div>
        <div class="add-row">
          <input type="text" id="custom-input" placeholder="Journal name..." />
          <button id="custom-add-btn">Add</button>
        </div>
      </div>

      <div class="section">
        <div class="section-label">NON-MATCHING RESULTS</div>
        <div class="radio-group">
          <label>
            <input type="radio" name="displayMode" value="highlight" />
            <span>Show all</span>
          </label>
          <label>
            <input type="radio" name="displayMode" value="dim" checked />
            <span>Dim</span>
          </label>
          <label>
            <input type="radio" name="displayMode" value="hide" />
            <span>Hide</span>
          </label>
        </div>
      </div>

      <div class="status">
        <span id="data-status">Loading...</span>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
